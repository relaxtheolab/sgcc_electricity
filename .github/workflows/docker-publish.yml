name: Build and Push Docker Image

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'setup_git_config.sh'
  workflow_dispatch:
    inputs:
      version:
        description: '自定义版本号（留空则用当前日期时间如 20260518-2200）'
        required: false
        type: string
        default: ''
      force_rebuild_base:
        description: '强制重建基础镜像（忽略30天检查）'
        required: false
        type: boolean
        default: false

jobs:
  check-base-image:
    uses: ./.github/workflows/docker-base.yml
    permissions:
      contents: read
      packages: write
    with:
      force_rebuild: ${{ inputs.force_rebuild_base || false }}
    secrets: inherit

  build-and-push:
    needs: check-base-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare variables
        id: vars
        run: |
          REPO_LOWER="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "repo_lower=${REPO_LOWER}" >> "$GITHUB_OUTPUT"

          if [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="$(date +%Y%m%d-%H%M)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "GHCR 镜像: ghcr.io/${REPO_LOWER}"
          echo "本次版本: ${TAG}"
          echo "构建时间: ${BUILD_DATE}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub（拉取基础镜像）
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.vars.outputs.repo_lower }}:${{ steps.vars.outputs.tag }}
          build-args: |
            VERSION=${{ steps.vars.outputs.tag }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/sgcc_electricity:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/sgcc_electricity:${{ steps.vars.outputs.tag }}
          build-args: |
            VERSION=${{ steps.vars.outputs.tag }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/sgcc_electricity
          short-description: 国家电网电费数据获取 - 支持 Home Assistant / 点选验证码自动识别
          readme-filepath: ./README.md

      - name: Clean up old GHCR images (keep latest 10)
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 10

      - name: Clean up old Docker Hub images (keep latest 10)
        run: |
          DH_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          DH_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
          REPO="sgcc_electricity"

          # 获取 Docker Hub token
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST "https://hub.docker.com/v2/users/login/" \
            -d "{\"username\": \"${DH_USER}\", \"password\": \"${DH_TOKEN}\"}" | jq -r .token)

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Docker Hub 登录失败，跳过清理"
            exit 0
          fi

          # 获取所有标签（按更新时间降序），排除 latest 和 base
          TAGS=$(curl -s -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${DH_USER}/${REPO}/tags/?page_size=100&ordering=-last_updated" \
            | jq -r '.results[] | select(.name != "latest" and .name != "base") | .name')

          TOTAL=$(echo "$TAGS" | wc -l)
          echo "Docker Hub 共 ${TOTAL} 个版本标签（不含 latest/base）"

          if [ "$TOTAL" -le 10 ]; then
            echo "未超过 10 个，无需清理"
            exit 0
          fi

          # 保留前 10 个（最新的），删除其余
          TO_DELETE=$(echo "$TAGS" | tail -n +11)
          COUNT=$(echo "$TO_DELETE" | wc -l)
          echo "将删除 ${COUNT} 个旧版本："
          echo "$TO_DELETE"

          for TAG in $TO_DELETE; do
            curl -s -o /dev/null -w "删除 ${TAG}: HTTP %{http_code}\n" \
              -X DELETE -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${DH_USER}/${REPO}/tags/${TAG}/"
          done

          echo "Docker Hub 旧版本清理完成"

      - name: Summary
        run: |
          DH_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          echo "### Docker 镜像发布成功" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 注册表 | latest | 版本 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHCR | \`ghcr.io/${{ steps.vars.outputs.repo_lower }}:latest\` | \`ghcr.io/${{ steps.vars.outputs.repo_lower }}:${{ steps.vars.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub | \`docker.io/${DH_USER}/sgcc_electricity:latest\` | \`docker.io/${DH_USER}/sgcc_electricity:${{ steps.vars.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "基础镜像: \`docker.io/${DH_USER}/sgcc_electricity:base\`" >> "$GITHUB_STEP_SUMMARY"
          echo "GHCR / Docker Hub 均保留最近 10 个版本，旧版本自动清理" >> "$GITHUB_STEP_SUMMARY"
